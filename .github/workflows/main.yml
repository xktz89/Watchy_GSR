name: Build WatchyGSR

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build
        run: pio run -e watchy-v3
      - name: Merge firmware
        run: |
          pip install esptool
          esptool.py --chip esp32s3 merge_bin \
            -o merged_firmware.bin \
            --flash_mode dio \
            --flash_size 8MB \
            0x0000 .pio/build/watchy-v3/bootloader.bin \
            0x8000 .pio/build/watchy-v3/partitions.bin \
            0x10000 .pio/build/watchy-v3/firmware.bin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: merged_firmware.bin
